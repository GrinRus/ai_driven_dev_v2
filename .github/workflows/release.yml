name: release

"on":
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --locked --extra dev

      - name: Lint
        run: |
          set -euo pipefail
          uv run --extra dev ruff check .

      - name: Type check
        run: |
          set -euo pipefail
          uv run --extra dev python -m mypy src scripts

      - name: Test
        run: |
          set -euo pipefail
          uv run --extra dev pytest -q

  build:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate release branch and PyPI tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          EXPECTED_RELEASE_BRANCH="release/${RELEASE_TAG}"
          export EXPECTED_RELEASE_BRANCH

          python - <<'PY'
          from __future__ import annotations

          import os
          import pathlib
          import re
          import sys
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          pattern = r"v\d+\.\d+\.\d+(?:[abrc]\d+)?(?:\.post\d+)?(?:\.dev\d+)?"
          if re.fullmatch(pattern, tag) is None:
              print(
                  "Unsupported release tag format. "
                  "Use v<major>.<minor>.<patch> with optional PEP 440 suffix "
                  "(aN, bN, rcN, .postN, .devN).",
                  file=sys.stderr,
              )
              print(f"Received tag: {tag}", file=sys.stderr)
              raise SystemExit(1)

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = project["project"]["version"]
          expected_tag = f"v{version}"
          if tag != expected_tag:
              print(
                  f"Release tag '{tag}' does not match project.version '{version}'. "
                  f"Expected '{expected_tag}'.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"Release tag '{tag}' matches project.version '{version}'.")

          expected_branch = os.environ["EXPECTED_RELEASE_BRANCH"]
          if expected_branch != f"release/{tag}":
              print(
                  f"Release branch '{expected_branch}' does not match expected "
                  f"'release/{tag}'.",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          print(f"Expected release branch: {expected_branch}")
          PY

          git fetch --no-tags origin "+refs/heads/${EXPECTED_RELEASE_BRANCH}:refs/remotes/origin/${EXPECTED_RELEASE_BRANCH}"
          git fetch --no-tags origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"

          RELEASE_BRANCH_SHA="$(git rev-parse "refs/remotes/origin/${EXPECTED_RELEASE_BRANCH}")"
          RELEASE_TAG_SHA="$(git rev-parse "${RELEASE_TAG}^{commit}")"

          if [ "${RELEASE_TAG_SHA}" != "${RELEASE_BRANCH_SHA}" ]; then
            echo "Release tag '${RELEASE_TAG}' does not point at '${EXPECTED_RELEASE_BRANCH}'." >&2
            echo "Tag commit: ${RELEASE_TAG_SHA}" >&2
            echo "Branch head: ${RELEASE_BRANCH_SHA}" >&2
            exit 1
          fi

          echo "Release tag '${RELEASE_TAG}' points at '${EXPECTED_RELEASE_BRANCH}' (${RELEASE_TAG_SHA})."

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --locked --extra dev

      - name: Build package
        run: |
          set -euo pipefail
          uv build

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  verify-pypi-install:
    if: github.event_name == 'release'
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: |
          set -euo pipefail
          python -m pip install --upgrade pipx

      - name: Verify published package installability via pipx
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION="${RELEASE_TAG#v}"
          ATTEMPTS=10
          BACKOFF_SECONDS=30

          for attempt in $(seq 1 "${ATTEMPTS}"); do
            echo "Attempt ${attempt}/${ATTEMPTS}: pipx install ai-driven-dev-v2==${PACKAGE_VERSION}"
            if python -m pipx install --force "ai-driven-dev-v2==${PACKAGE_VERSION}"; then
              break
            fi
            if [ "${attempt}" -eq "${ATTEMPTS}" ]; then
              echo "PyPI package ai-driven-dev-v2==${PACKAGE_VERSION} was not installable after ${ATTEMPTS} attempts."
              exit 1
            fi
            echo "Waiting ${BACKOFF_SECONDS}s for package availability..."
            sleep "${BACKOFF_SECONDS}"
          done

          python -m pipx run --spec "ai-driven-dev-v2==${PACKAGE_VERSION}" aidd --version
          python -m pipx run --spec "ai-driven-dev-v2==${PACKAGE_VERSION}" aidd doctor

  verify-uv-tool-install:
    if: github.event_name == 'release'
    needs: verify-pypi-install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify published package installability via uv tool
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION="${RELEASE_TAG#v}"
          PACKAGE_SPEC="ai-driven-dev-v2==${PACKAGE_VERSION}"
          ATTEMPTS=10
          BACKOFF_SECONDS=30

          for attempt in $(seq 1 "${ATTEMPTS}"); do
            echo "Attempt ${attempt}/${ATTEMPTS}: uv tool install ${PACKAGE_SPEC}"
            if uv tool install --force "${PACKAGE_SPEC}"; then
              break
            fi
            if [ "${attempt}" -eq "${ATTEMPTS}" ]; then
              echo "uv tool could not install ${PACKAGE_SPEC} after ${ATTEMPTS} attempts."
              exit 1
            fi
            echo "Waiting ${BACKOFF_SECONDS}s for package availability..."
            sleep "${BACKOFF_SECONDS}"
          done

          uv tool run --from "${PACKAGE_SPEC}" aidd --version
          uv tool run --from "${PACKAGE_SPEC}" aidd doctor
