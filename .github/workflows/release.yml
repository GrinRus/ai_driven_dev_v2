name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate PyPI release tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import pathlib
          import re
          import sys
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          pattern = r"v\d+\.\d+\.\d+(?:[abrc]\d+)?(?:\.post\d+)?(?:\.dev\d+)?"
          if re.fullmatch(pattern, tag) is None:
              print(
                  "Unsupported release tag format. "
                  "Use v<major>.<minor>.<patch> with optional PEP 440 suffix "
                  "(aN, bN, rcN, .postN, .devN).",
                  file=sys.stderr,
              )
              print(f"Received tag: {tag}", file=sys.stderr)
              raise SystemExit(1)

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = project["project"]["version"]
          expected_tag = f"v{version}"
          if tag != expected_tag:
              print(
                  f"Release tag '{tag}' does not match project.version '{version}'. "
                  f"Expected '{expected_tag}'.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"Release tag '{tag}' matches project.version '{version}'.")
          PY

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build package
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-pypi-install:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: python -m pip install --upgrade pipx

      - name: Verify published package installability via pipx
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION="${RELEASE_TAG#v}"
          ATTEMPTS=10
          BACKOFF_SECONDS=30

          for attempt in $(seq 1 "${ATTEMPTS}"); do
            echo "Attempt ${attempt}/${ATTEMPTS}: pipx install ai-driven-dev-v2==${PACKAGE_VERSION}"
            if python -m pipx install --force "ai-driven-dev-v2==${PACKAGE_VERSION}"; then
              break
            fi
            if [ "${attempt}" -eq "${ATTEMPTS}" ]; then
              echo "PyPI package ai-driven-dev-v2==${PACKAGE_VERSION} was not installable after ${ATTEMPTS} attempts."
              exit 1
            fi
            echo "Waiting ${BACKOFF_SECONDS}s for package availability..."
            sleep "${BACKOFF_SECONDS}"
          done

          python -m pipx run --spec "ai-driven-dev-v2==${PACKAGE_VERSION}" aidd --version
          python -m pipx run --spec "ai-driven-dev-v2==${PACKAGE_VERSION}" aidd doctor

  verify-uv-tool-install:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-pypi-install
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify published package installability via uv tool
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION="${RELEASE_TAG#v}"
          PACKAGE_SPEC="ai-driven-dev-v2==${PACKAGE_VERSION}"
          ATTEMPTS=10
          BACKOFF_SECONDS=30

          for attempt in $(seq 1 "${ATTEMPTS}"); do
            echo "Attempt ${attempt}/${ATTEMPTS}: uv tool install ${PACKAGE_SPEC}"
            if uv tool install --force "${PACKAGE_SPEC}"; then
              break
            fi
            if [ "${attempt}" -eq "${ATTEMPTS}" ]; then
              echo "uv tool could not install ${PACKAGE_SPEC} after ${ATTEMPTS} attempts."
              exit 1
            fi
            echo "Waiting ${BACKOFF_SECONDS}s for package availability..."
            sleep "${BACKOFF_SECONDS}"
          done

          uv tool run --from "${PACKAGE_SPEC}" aidd --version
          uv tool run --from "${PACKAGE_SPEC}" aidd doctor

  publish-container:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: image_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ai-driven-dev-v2
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, '.dev') && !contains(github.ref_name, '.post') }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_meta.outputs.tags }}
          labels: ${{ steps.image_meta.outputs.labels }}
