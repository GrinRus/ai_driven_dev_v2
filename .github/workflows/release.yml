name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate PyPI release tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import os
          import pathlib
          import re
          import sys
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          pattern = r"v\d+\.\d+\.\d+(?:[abrc]\d+)?(?:\.post\d+)?(?:\.dev\d+)?"
          if re.fullmatch(pattern, tag) is None:
              print(
                  "Unsupported release tag format. "
                  "Use v<major>.<minor>.<patch> with optional PEP 440 suffix "
                  "(aN, bN, rcN, .postN, .devN).",
                  file=sys.stderr,
              )
              print(f"Received tag: {tag}", file=sys.stderr)
              raise SystemExit(1)

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = project["project"]["version"]
          expected_tag = f"v{version}"
          if tag != expected_tag:
              print(
                  f"Release tag '{tag}' does not match project.version '{version}'. "
                  f"Expected '{expected_tag}'.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"Release tag '{tag}' matches project.version '{version}'.")
          PY

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --locked --extra dev

      - name: Build package
        run: |
          set -euo pipefail
          uv build

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  verify-pypi-install:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: |
          set -euo pipefail
          python -m pip install --upgrade pipx

      - name: Verify published package installability via pipx
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION="${RELEASE_TAG#v}"
          ATTEMPTS=10
          BACKOFF_SECONDS=30

          for attempt in $(seq 1 "${ATTEMPTS}"); do
            echo "Attempt ${attempt}/${ATTEMPTS}: pipx install ai-driven-dev-v2==${PACKAGE_VERSION}"
            if python -m pipx install --force "ai-driven-dev-v2==${PACKAGE_VERSION}"; then
              break
            fi
            if [ "${attempt}" -eq "${ATTEMPTS}" ]; then
              echo "PyPI package ai-driven-dev-v2==${PACKAGE_VERSION} was not installable after ${ATTEMPTS} attempts."
              exit 1
            fi
            echo "Waiting ${BACKOFF_SECONDS}s for package availability..."
            sleep "${BACKOFF_SECONDS}"
          done

          python -m pipx run --spec "ai-driven-dev-v2==${PACKAGE_VERSION}" aidd --version
          python -m pipx run --spec "ai-driven-dev-v2==${PACKAGE_VERSION}" aidd doctor

  verify-uv-tool-install:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-pypi-install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify published package installability via uv tool
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION="${RELEASE_TAG#v}"
          PACKAGE_SPEC="ai-driven-dev-v2==${PACKAGE_VERSION}"
          ATTEMPTS=10
          BACKOFF_SECONDS=30

          for attempt in $(seq 1 "${ATTEMPTS}"); do
            echo "Attempt ${attempt}/${ATTEMPTS}: uv tool install ${PACKAGE_SPEC}"
            if uv tool install --force "${PACKAGE_SPEC}"; then
              break
            fi
            if [ "${attempt}" -eq "${ATTEMPTS}" ]; then
              echo "uv tool could not install ${PACKAGE_SPEC} after ${ATTEMPTS} attempts."
              exit 1
            fi
            echo "Waiting ${BACKOFF_SECONDS}s for package availability..."
            sleep "${BACKOFF_SECONDS}"
          done

          uv tool run --from "${PACKAGE_SPEC}" aidd --version
          uv tool run --from "${PACKAGE_SPEC}" aidd doctor
