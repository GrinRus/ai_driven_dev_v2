name: manual-live-e2e

on:
  workflow_dispatch:
    inputs:
      scenario_id:
        description: Scenario id from harness/scenarios/live to execute
        required: true
        type: string
      runtime_id:
        description: Runtime id to use for the selected scenario
        required: true
        type: choice
        options:
          - codex
          - opencode
      feature_size:
        description: Optional feature-size filter to enforce during selection
        required: false
        default: ""
        type: string
      scenario_class:
        description: Optional scenario-class filter to enforce during selection
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  manual-live-e2e:
    runs-on: ubuntu-latest
    env:
      AIDD_EVAL_CODEX_COMMAND: ${{ secrets.AIDD_EVAL_CODEX_COMMAND }}
      AIDD_EVAL_OPENCODE_COMMAND: ${{ secrets.AIDD_EVAL_OPENCODE_COMMAND }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Resolve manual live scenario
        env:
          FEATURE_SIZE: ${{ inputs.feature_size }}
          RUNTIME_ID: ${{ inputs.runtime_id }}
          SCENARIO_CLASS: ${{ inputs.scenario_class }}
          SCENARIO_ID: ${{ inputs.scenario_id }}
        run: |
          set -euo pipefail

          uv run python - <<'PY'
          from __future__ import annotations

          import os
          import sys
          from pathlib import Path

          from aidd.harness.scenarios import load_scenario

          scenario_id = os.environ["SCENARIO_ID"].strip()
          runtime_id = os.environ["RUNTIME_ID"].strip()
          feature_size = os.environ["FEATURE_SIZE"].strip()
          scenario_class = os.environ["SCENARIO_CLASS"].strip()

          matches: list[tuple[Path, object]] = []
          for manifest_path in sorted(Path("harness/scenarios/live").glob("*.yaml")):
              scenario = load_scenario(manifest_path)
              if scenario.scenario_id != scenario_id:
                  continue
              matches.append((manifest_path, scenario))

          if not matches:
              raise SystemExit(f"No scenario found for id: {scenario_id}")
          if len(matches) != 1:
              paths = ", ".join(path.as_posix() for path, _scenario in matches)
              raise SystemExit(f"Scenario id {scenario_id} is ambiguous across: {paths}")

          manifest_path, scenario = matches[0]
          if scenario.automation_lane != "manual":
              raise SystemExit(
                  f"Scenario {scenario_id} does not declare automation_lane=manual."
              )
          if runtime_id not in scenario.runtime_targets:
              supported = ", ".join(scenario.runtime_targets)
              raise SystemExit(
                  f"Runtime {runtime_id} is not supported by {scenario_id}. Supported: {supported}"
              )
          if feature_size and scenario.feature_size != feature_size:
              raise SystemExit(
                  f"Scenario {scenario_id} has feature_size={scenario.feature_size}, "
                  f"not requested {feature_size}."
              )
          if scenario_class and scenario.scenario_class != scenario_class:
              raise SystemExit(
                  f"Scenario {scenario_id} has scenario_class={scenario.scenario_class}, "
                  f"not requested {scenario_class}."
              )

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as handle:
              handle.write(f"SCENARIO_PATH={manifest_path.as_posix()}\n")
              handle.write(f"SCENARIO_CANONICAL_RUNTIME={scenario.canonical_runtime}\n")
          print(f"Resolved scenario: {manifest_path.as_posix()}")
          print(f"Canonical runtime: {scenario.canonical_runtime}")
          print(f"Requested runtime: {runtime_id}")
          PY

      - name: Validate manual live runtime readiness
        env:
          RUNTIME_ID: ${{ inputs.runtime_id }}
        run: |
          set -euo pipefail

          uv run python - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path

          from aidd.harness.live_runtime_config import validate_live_runtime_command
          from aidd.harness.scenarios import load_scenario

          runtime_id = os.environ["RUNTIME_ID"].strip()
          scenario = load_scenario(
              Path(os.environ["SCENARIO_PATH"]),
              runtime_id=runtime_id,
              workspace_root=Path(".aidd"),
          )
          command_entry = validate_live_runtime_command(
              runtime_id=runtime_id,
              scenario=scenario,
          )
          print(
              "Validated runtime readiness: "
              f"runtime={runtime_id} mode={command_entry.execution_mode.value} "
              f"source={command_entry.source} command={command_entry.command}"
          )
          PY

      - name: Run manual live eval
        run: uv run aidd eval run "$SCENARIO_PATH" --runtime "${{ inputs.runtime_id }}"

      - name: Upload live eval bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-live-e2e-${{ inputs.scenario_id }}-${{ inputs.runtime_id }}
          path: .aidd/reports/evals/
