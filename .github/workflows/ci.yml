name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --locked --extra dev

      - name: Lint
        run: |
          set -euo pipefail
          uv run --extra dev ruff check .

      - name: Type check
        run: |
          set -euo pipefail
          uv run --extra dev python -m mypy src scripts

      - name: Packaged JavaScript syntax
        run: |
          set -euo pipefail
          uv run --extra dev python scripts/check_packaged_javascript.py

      - name: Packaged JavaScript DOM state
        run: |
          set -euo pipefail
          node --test tests/frontend/*.test.mjs

      - name: Test
        run: |
          set -euo pipefail
          uv run --extra dev pytest -q

  adapter-conformance:
    needs: lint-type-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --locked --extra dev

      - name: Adapter conformance lane
        run: |
          set -euo pipefail
          uv run --extra dev pytest -vv tests/harness/test_adapter_conformance_lane.py

  deterministic-scenarios:
    needs: lint-type-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --locked --extra dev

      - name: Deterministic CI scenario lane
        run: |
          set -euo pipefail
          uv run --extra dev python scripts/run_ci_scenarios.py --root .aidd-ci

  packaged-ui-browser:
    needs: lint-type-test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --locked --extra dev

      - name: Cache Chromium browser
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Chromium system dependencies
        run: |
          set -euo pipefail
          uv run --extra dev python -m playwright install-deps chromium

      - name: Install Chromium browser
        run: |
          set -euo pipefail
          uv run --extra dev python -m playwright install chromium

      - name: Packaged UI browser journeys
        run: |
          set -euo pipefail
          uv run --extra dev python scripts/run_packaged_ui_scenarios.py

  build:
    needs:
      - lint-type-test
      - adapter-conformance
      - deterministic-scenarios
      - packaged-ui-browser
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --locked --extra dev

      - name: Build package
        run: |
          set -euo pipefail
          uv build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
