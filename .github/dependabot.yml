version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "mkdocs*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
