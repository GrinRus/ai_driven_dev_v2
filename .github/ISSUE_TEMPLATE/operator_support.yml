name: Operator support
description: Ask for help with an alpha operator workflow.
title: "[Support]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Public support is best-effort for alpha. Do not include secrets, private repository contents, provider tokens, or unredacted raw runtime logs.
  - type: input
    id: version
    attributes:
      label: AIDD version
      description: Output from `aidd --version`.
    validations:
      required: true
  - type: dropdown
    id: install_path
    attributes:
      label: Installation path
      options:
        - pipx
        - uv tool
        - source checkout
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: Paste redacted `aidd doctor` output.
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
      description: Describe the workflow, stage, runtime, and blocker.
    validations:
      required: true
