id: AIDD-SMOKE-001
scenario_class: deterministic-stage
feature_size: small
automation_lane: ci
canonical_runtime: generic-cli
repo:
  url: harness/fixtures/minimal-python
objective: Keep the smallest deterministic stage lane local and reproducible by exercising
  a single plan-stage run against the minimal fixture.
task: Run the plan stage against the local minimal fixture and verify that required
  output files are produced.
stage_scope:
  start: plan
  end: plan
setup:
  commands:
  - |-
    cat > aidd.example.toml <<'TOML'
    [workspace]
    root = ".aidd"

    [runtime.generic_cli]
    command = "python3 ../aidd_fixture_runtime.py"
    TOML
aidd_invocation:
  work_item: WI-SMOKE-PLAN
  expected_stage_scope:
    start: plan
    end: plan
feature_source:
  mode: fixture-seed
  selection_policy: fixture-owned
  fixture_path: harness/fixtures/minimal-python
  seed_id: minimal-python-plan-stage
  summary: Use the minimal-python fixture-owned plan-stage context to keep the smallest
    deterministic lane reproducible and local.
verify:
  commands:
  - test -f .aidd/workitems/WI-SMOKE-PLAN/stages/plan/output/plan.md
  - test -f .aidd/workitems/WI-SMOKE-PLAN/stages/plan/output/stage-result.md
  - test -f .aidd/workitems/WI-SMOKE-PLAN/stages/plan/output/validator-report.md
  - PYTHONPATH=src python -m pytest -q tests/test_minimal_app.py
limits:
  timeout_minutes: 5
interview:
  required: false
runtime_targets:
- generic-cli
