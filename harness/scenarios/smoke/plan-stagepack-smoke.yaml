id: AIDD-STAGEPACK-PLAN-SMOKE-001
repo:
  url: harness/fixtures/minimal-python
objective: Define a cross-runtime smoke lane for plan-stage execution and require
  durable output artifacts for every declared runtime target.
task: Run the plan-stage smoke lane and verify required output documents are produced.
stage_scope:
  start: plan
  end: plan
setup:
  commands:
  - uv sync --extra dev
  rationale:
  - Install development dependencies before smoke execution.
  - Keep the smoke lane reproducible in local contributor environments.
aidd_invocation:
  command:
  - uv
  - run
  - aidd
  - run
  work_item: WI-STAGE-PLAN-SMOKE
  work_item_flag: --work-item
  runtime_flag: --runtime
  expected_stage_scope:
    start: plan
    end: plan
verify:
  commands:
  - test -f .aidd/workitems/WI-STAGE-PLAN-SMOKE/stages/plan/output/plan.md
  - test -f .aidd/workitems/WI-STAGE-PLAN-SMOKE/stages/plan/output/stage-result.md
  - test -f .aidd/workitems/WI-STAGE-PLAN-SMOKE/stages/plan/output/validator-report.md
  pass_conditions:
  - Verification commands exit with status 0.
  - Plan stage output includes `plan.md`, `stage-result.md`, and `validator-report.md`.
limits:
  timeout_minutes: 5
interview:
  required: false
runtime_targets:
- generic-cli
- claude-code
- codex
- opencode
