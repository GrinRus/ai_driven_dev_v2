id: AIDD-DETERMINISTIC-004
scenario_class: deterministic-workflow
feature_size: medium
automation_lane: ci
canonical_runtime: generic-cli
repo:
  url: harness/fixtures/minimal-python
objective: Prove dependency-ordered task execution, task-local repository evidence,
  aggregate finalization, and review/QA progression without provider authentication.
task: Execute a three-task rich tasklist against the local fixture and preserve task-local
  attempts plus the aggregate implementation report.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - |-
    cat > aidd.example.toml <<'TOML'
    [workspace]
    root = ".aidd"

    [runtime.generic_cli]
    command = "python3 ../aidd_fixture_runtime.py"
    TOML
aidd_invocation:
  work_item: WI-DETERMINISTIC-TASKS
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: fixture-seed
  selection_policy: fixture-owned
  fixture_path: harness/fixtures/minimal-python
  seed_id: minimal-python-task-execution
  summary: Use a local three-task chain with one repository change per task and aggregate
    review/QA evidence after finalization.
verify:
  commands:
  - test -f .aidd/reports/runs/WI-DETERMINISTIC-TASKS/*/stages/implement/task-ledger.json
  - test -f .aidd/workitems/WI-DETERMINISTIC-TASKS/stages/implement/output/implementation-report.md
  - test -f .aidd/workitems/WI-DETERMINISTIC-TASKS/stages/qa/output/qa-report.md
  - test -d .aidd/reports/runs/WI-DETERMINISTIC-TASKS/*/stages/implement/finalization/attempts/attempt-0001
  - test -f .aidd/reports/runs/WI-DETERMINISTIC-TASKS/*/stages/implement/tasks/TL-2/attempts/attempt-0001/task-diff.json
  - test -f .aidd/reports/runs/WI-DETERMINISTIC-TASKS/*/stages/implement/tasks/TL-3/attempts/attempt-0001/attempt-state.json
  pass_conditions:
  - Every task reaches succeeded in dependency order.
  - Every task has one task-local attempt with repository diff evidence.
  - Aggregate publication succeeds only after all dependency-ready tasks complete.
  - Review and QA contain one structured evidence entry per task acceptance criterion.
  - Review and QA start only after the task ledger and aggregate finalization succeed.
limits:
  timeout_minutes: 10
interview:
  required: true
runtime_targets:
- generic-cli
