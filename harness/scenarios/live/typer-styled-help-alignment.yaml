id: AIDD-LIVE-001
scenario_class: live-full-flow
feature_size: small
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/fastapi/typer
  default_branch: master
  revision: 9ce8e30383ef419c490431caab5a515eca669b1b
objective: Keep Typer smoke lane deterministic by targeting the styled help alignment
  defect with bounded patch scope and regression coverage.
health:
  status: setup-blocked
  note: Current pinned Typer baseline fails during setup before the runtime boundary;
    keep this lane non-canonical until it is repinned or fixed.
task: Run the installed AIDD full-flow live audit against the selected Typer authored task
  and preserve reviewable execution evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync --group tests
  - uv run pytest -q
  rationale:
  - Install Typer dependencies and test extras before the live audit.
  - Confirm a clean baseline test pass before AIDD applies changes.
aidd_invocation:
  command:
  - uv
  - run
  - aidd
  - run
  work_item: WI-LIVE-TYPER-SMOKE
  work_item_flag: --work-item
  runtime_flag: --runtime
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-TYPER-STYLED-HELP-ALIGNMENT
    title: styled help alignment bugfix
    summary: Fix help-line width calculation when styled help text is present and
      add regression coverage.
    intent: Preserve Typer help alignment when styled text is present in command help.
    target_change: Correct styled help width calculation and add a regression test that
      fails on the pinned baseline.
    expected_scope: Localized help formatting behavior plus test coverage.
    acceptance_criteria:
    - Styled help text aligns with unstyled help lines at the configured width.
    - The regression test demonstrates the styled-width case.
    - Existing unstyled help rendering remains unchanged.
    verification:
    - uv run pytest -q
    - test -f .aidd/workitems/WI-LIVE-TYPER-SMOKE/stages/qa/output/stage-result.md
    - test -f .aidd/workitems/WI-LIVE-TYPER-SMOKE/stages/qa/output/validator-report.md
    quality_bar: The patch should be a focused help-rendering fix with regression evidence,
      not a broad formatter rewrite.
    size_rationale: Small because the expected behavior change is localized, but it
      requires test coverage.
verify:
  commands:
  - uv run pytest -q
  - test -f .aidd/workitems/WI-LIVE-TYPER-SMOKE/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-TYPER-SMOKE/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification command exits with status 0.
  - Pytest output reports all tests as passed.
  - No new failing tests are introduced relative to baseline.
  - QA stage output artifacts exist for the selected work item.
limits:
  patch_budget_files: 4
  timeout_minutes: 20
interview:
  required: false
runtime_targets:
- codex
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: agent-decides
  frontend_checkpoints: true
