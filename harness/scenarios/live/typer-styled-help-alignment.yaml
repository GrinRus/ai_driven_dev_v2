id: AIDD-LIVE-001
scenario_class: live-full-flow
feature_size: small
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/fastapi/typer
  default_branch: master
  revision: 9ce8e30383ef419c490431caab5a515eca669b1b
objective: Keep Typer smoke lane deterministic by targeting the styled help alignment
  defect with bounded patch scope and regression coverage.
task: Run the installed AIDD full-flow live audit against the selected Typer issue
  and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync --group tests || uv sync
  - uv run pytest -q || pytest -q
  rationale:
  - Install Typer dependencies and test extras before the live audit.
  - Confirm a clean baseline test pass before AIDD applies changes.
aidd_invocation:
  command:
  - uv
  - run
  - aidd
  - run
  work_item: WI-LIVE-TYPER-SMOKE
  work_item_flag: --work-item
  runtime_flag: --runtime
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: curated-issue-pool
  selection_policy: first-listed
  issues:
  - id: '1159'
    title: styled help alignment bugfix
    url: https://github.com/fastapi/typer/issues/1159
    summary: Fix help-line width calculation when styled help text is present and
      add regression coverage.
    labels:
    - bug
    - cli
verify:
  commands:
  - uv run pytest -q || pytest -q
  - test -f .aidd/workitems/WI-LIVE-TYPER-SMOKE/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-TYPER-SMOKE/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification command exits with status 0.
  - Pytest output reports all tests as passed.
  - No new failing tests are introduced relative to baseline.
  - QA stage output artifacts exist for the selected work item.
quality:
  commands:
  - uv run pytest -q || pytest -q
  rubric_profile: live-full
  require_review_status: approved
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
