id: AIDD-LIVE-002
repo:
  url: https://github.com/fastapi/typer
  default_branch: master
objective: Keep Typer full-flow live coverage deterministic by targeting the boolean
  help rendering issue through the installed operator path.
task: Run the installed AIDD full-flow live audit against the selected Typer issue
  and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync --group tests || uv sync
aidd_invocation:
  work_item: WI-LIVE-TYPER-BOOLEAN
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: curated-issue-pool
  selection_policy: first-listed
  issues:
  - id: '678'
    title: boolean option help rendering
    url: https://github.com/fastapi/typer/issues/678
    summary: Improve `--help` rendering for boolean options while preserving clarity
      of type and default details.
    labels:
    - enhancement
    - cli
verify:
  commands:
  - uv run pytest -q || pytest -q
  - test -f .aidd/workitems/WI-LIVE-TYPER-BOOLEAN/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-TYPER-BOOLEAN/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification command exits with status 0.
  - QA stage output artifacts exist for the selected work item.
quality:
  commands:
  - uv run pytest -q || pytest -q
  rubric_profile: live-full
  require_review_status: approved
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
limits:
  patch_budget_files: 8
  timeout_minutes: 20
interview:
  required: false
runtime_targets:
- claude-code
- generic-cli
