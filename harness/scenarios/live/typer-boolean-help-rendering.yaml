id: AIDD-LIVE-002
scenario_class: live-full-flow
feature_size: medium
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/fastapi/typer
  default_branch: master
objective: Keep Typer full-flow live coverage deterministic by targeting the boolean
  help rendering authored task through the installed operator path.
task: Run the installed AIDD full-flow live audit against the selected Typer authored task
  and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync --group tests
aidd_invocation:
  work_item: WI-LIVE-TYPER-BOOLEAN
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-TYPER-BOOLEAN-HELP
    title: boolean option help rendering
    summary: Improve `--help` rendering for boolean options while preserving clarity
      of type and default details.
    intent: Make boolean option help output clear and stable for Typer CLI users.
    target_change: Adjust help rendering for boolean options and add regression coverage
      for the displayed option/default details.
    expected_scope: Help formatting behavior, tests, and any narrowly required docs fixture
      updates.
    acceptance_criteria:
    - Boolean option help output is easier to read and preserves default/type clarity.
    - Existing non-boolean option help rendering remains stable.
    - Regression tests assert the rendered help text.
    verification:
    - uv run pytest -q tests/test_tutorial/test_parameter_types/test_bool tests/test_tutorial/test_options/test_help/test_tutorial003.py
      tests/test_tutorial/test_options/test_help/test_tutorial004.py
    - TYPER_USE_RICH=0 uv run pytest -q tests/test_tutorial/test_parameter_types/test_bool
      tests/test_tutorial/test_options/test_help/test_tutorial003.py tests/test_tutorial/test_options/test_help/test_tutorial004.py
    - test -f .aidd/workitems/WI-LIVE-TYPER-BOOLEAN/stages/qa/output/stage-result.md
    - test -f .aidd/workitems/WI-LIVE-TYPER-BOOLEAN/stages/qa/output/validator-report.md
    quality_bar: The result should improve CLI output without broad Rich/help rendering churn.
    size_rationale: Medium because help rendering can cross formatting code and snapshot-like
      test expectations even when the user-facing change is narrow.
verify:
  commands:
  - uv run pytest -q tests/test_tutorial/test_parameter_types/test_bool tests/test_tutorial/test_options/test_help/test_tutorial003.py
    tests/test_tutorial/test_options/test_help/test_tutorial004.py
  - TYPER_USE_RICH=0 uv run pytest -q tests/test_tutorial/test_parameter_types/test_bool
    tests/test_tutorial/test_options/test_help/test_tutorial003.py tests/test_tutorial/test_options/test_help/test_tutorial004.py
  - test -f .aidd/workitems/WI-LIVE-TYPER-BOOLEAN/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-TYPER-BOOLEAN/stages/qa/output/validator-report.md
  pass_conditions:
  - Focused Rich/default and non-Rich verification commands exit with status 0.
  - QA stage output artifacts exist for the selected work item.
quality:
  commands:
  - uv run pytest -q tests/test_tutorial/test_parameter_types/test_bool tests/test_tutorial/test_options/test_help/test_tutorial003.py
    tests/test_tutorial/test_options/test_help/test_tutorial004.py
  - TYPER_USE_RICH=0 uv run pytest -q tests/test_tutorial/test_parameter_types/test_bool
    tests/test_tutorial/test_options/test_help/test_tutorial003.py tests/test_tutorial/test_options/test_help/test_tutorial004.py
  rubric_profile: live-full
  require_review_status: approved
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
limits:
  patch_budget_files: 8
  timeout_minutes: 90
interview:
  required: false
runtime_targets:
- codex
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: agent-decides
  frontend_checkpoints: true
