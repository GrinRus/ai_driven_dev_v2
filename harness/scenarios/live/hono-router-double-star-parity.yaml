id: AIDD-LIVE-008
scenario_class: live-full-flow-interview
feature_size: xlarge
automation_lane: manual
canonical_runtime: opencode
repo:
  url: https://github.com/honojs/hono
  default_branch: main
objective: Keep Hono interview live coverage deterministic with an authored router
  parity task that requires explicit compatibility clarification.
task: Run the installed AIDD full-flow live audit against the selected Hono interview
  task and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - bun install
aidd_invocation:
  work_item: WI-LIVE-HONO-INTERVIEW
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-HONO-ROUTER-DOUBLE-STAR
    title: router parity with /** syntax
    summary: Align router behavior or document the intended divergence, and require
      an interview when compatibility risk is unclear.
    intent: Decide and implement the expected `/**` route matching semantics across
      maintained Hono router behavior.
    target_change: Implement router parity for `/**` when compatibility answers choose
      parity, or document and test an intentional divergence when answers choose that path.
    expected_scope: Router matching behavior, compatibility tests, type checks, and
      release-facing documentation for the selected policy.
    acceptance_criteria:
    - Blocking questions capture the parity-versus-divergence policy before planning.
    - The selected policy is reflected in router tests and documentation.
    - Existing wildcard and catch-all route behavior remains compatible unless answers
      explicitly approve a breaking change.
    verification:
    - uv run aidd stage questions idea --work-item WI-LIVE-HONO-INTERVIEW
    - test -f .aidd/workitems/WI-LIVE-HONO-INTERVIEW/stages/idea/answers.md
    - bun test
    - bunx tsc --noEmit
    quality_bar: The result must be compatibility-explicit, tested across router variants,
      and free of silent routing semantic drift.
    size_rationale: Xlarge because the task is API-sensitive, interview-gated, and may
      affect router compatibility plus documentation across multiple surfaces.
    interview:
    - Expected `/**` behavior relative to existing wildcard routing semantics.
    - Whether router parity should be implemented or explicitly documented as an intentional divergence.
    - Required compatibility notes and release-facing documentation updates for the chosen behavior.
verify:
  commands:
  - uv run aidd stage questions idea --work-item WI-LIVE-HONO-INTERVIEW
  - test -f .aidd/workitems/WI-LIVE-HONO-INTERVIEW/stages/idea/answers.md
  - bun test
  - bunx tsc --noEmit
  - test -f .aidd/workitems/WI-LIVE-HONO-INTERVIEW/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-HONO-INTERVIEW/stages/qa/output/validator-report.md
  pass_conditions:
  - The first stage-questions check reports at least one pending blocking question.
  - Answers file resolves each blocking question before stage rerun.
  - Verification commands exit with status 0 after resume.
  - QA stage output artifacts exist after the resumed execution path.
  flow_steps:
  - step: blocked
    evidence: questions.md exists with at least one blocking question id.
  - step: resumed
    evidence: answers.md exists and marks each blocking question as resolved.
  - step: completed
    evidence: verification commands and QA output artifact checks succeed after rerun.
quality:
  commands:
  - bun test
  - bunx tsc --noEmit
  rubric_profile: live-full
  require_review_status: approved-with-conditions
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
limits:
  patch_budget_files: 12
  timeout_minutes: 60
interview:
  required: true
  must_ask_at_least_one: true
  blocking_question_topics:
  - Expected `/**` behavior relative to existing wildcard routing semantics.
  - Whether router parity should be implemented or explicitly documented as an intentional divergence.
  - Required compatibility notes and release-facing documentation updates for the chosen behavior.
  trigger_conditions:
  - If expected `/**` matching behavior is not explicitly defined, ask a blocking question before planning.
  - If parity-vs-divergence decision is ambiguous, ask a blocking question before task decomposition.
  - If documentation and compatibility obligations are unclear, ask a blocking question before implementation.
  answer_flow:
    mode: answers_markdown_and_stage_rerun
    answers_file: .aidd/workitems/WI-LIVE-HONO-INTERVIEW/stages/idea/answers.md
    question_check_command:
    - uv
    - run
    - aidd
    - stage
    - questions
    - idea
    - --work-item
    - WI-LIVE-HONO-INTERVIEW
    resume_command:
    - uv
    - run
    - aidd
    - stage
    - run
    - idea
    - --work-item
    - WI-LIVE-HONO-INTERVIEW
    - --runtime
    - opencode
    answer_requirements:
    - Resolve each blocking routing-semantic question with an explicit policy choice.
    - Keep compatibility and documentation commitments in the same answers file.
runtime_targets:
- opencode
