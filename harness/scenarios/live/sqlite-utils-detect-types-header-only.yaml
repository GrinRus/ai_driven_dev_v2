id: AIDD-LIVE-005
scenario_class: live-full-flow
feature_size: small
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/simonw/sqlite-utils
  default_branch: main
  revision: 8d74ffc93292c604d5827e2b44fffedca0c28c19
objective: Keep sqlite-utils smoke lane deterministic by targeting the header-only
  detect-types crash with bounded patch scope.
task: Run the installed AIDD full-flow live audit against the selected sqlite-utils
  authored task and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync
  rationale:
  - Install sqlite-utils development dependencies before the live audit.
  - Confirm the repository environment is ready for targeted regression verification.
aidd_invocation:
  work_item: WI-LIVE-SQLITE-SMOKE
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-SQLITE-DETECT-TYPES-HEADER-ONLY
    title: header-only CSV bugfix
    summary: Prevent a crash when `--detect-types` is used on a CSV file that contains
      only a header row and add regression coverage.
    intent: Keep CSV import robust when type detection sees headers without data rows.
    target_change: Fix the header-only `--detect-types` crash path and add a targeted
      regression test.
    expected_scope: Localized CSV import behavior plus test coverage.
    acceptance_criteria:
    - Header-only CSV input with `--detect-types` completes without crashing.
    - The resulting table schema remains sensible for header-only input.
    - Regression coverage exercises the CLI or nearest stable import surface.
    verification:
    - uv run pytest -q
    - test -f .aidd/workitems/WI-LIVE-SQLITE-SMOKE/stages/qa/output/stage-result.md
    - test -f .aidd/workitems/WI-LIVE-SQLITE-SMOKE/stages/qa/output/validator-report.md
    quality_bar: The patch should stay small, cover the edge case, and avoid broad CSV
      import rewrites.
    size_rationale: Small because the expected fix is a localized bugfix with one or
      more focused tests.
operator_execution:
  install_channel: uv-tool
  artifact_source: local-wheel
  execution_cwd: repository-root
  workspace_root: .aidd
  resource_source: packaged-assets
verify:
  commands:
  - uv run pytest -q
  - test -f .aidd/workitems/WI-LIVE-SQLITE-SMOKE/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-SQLITE-SMOKE/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification command exits with status 0.
  - Pytest output reports all tests as passed.
  - No new failing tests are introduced relative to baseline.
  - QA stage output artifacts exist for the selected work item.
quality:
  commands:
  - uv run pytest -q
  rubric_profile: live-full
  require_review_status: approved
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
limits:
  patch_budget_files: 4
  timeout_minutes: 240
interview:
  required: false
runtime_targets:
- codex
- opencode
- claude-code
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: agent-decides
  frontend_checkpoints: true
