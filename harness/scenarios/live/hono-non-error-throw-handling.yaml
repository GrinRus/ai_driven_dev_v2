id: AIDD-LIVE-007
scenario_class: live-full-flow
feature_size: medium
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/honojs/hono
  default_branch: main
  revision: cf2d2b7edcf07adef2db7614557f4d7f9e2be7ba
objective: Keep Hono smoke lane deterministic by targeting the non-Error throw
  handling defect with bounded patch scope.
task: Run the installed AIDD full-flow live audit against the selected Hono authored task
  and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - bun install
  rationale:
  - Install Hono development dependencies with Bun before the live audit.
  - Confirm the repository workspace is ready for targeted middleware regression verification.
aidd_invocation:
  command:
  - uv
  - run
  - aidd
  - run
  work_item: WI-LIVE-HONO-SMOKE
  work_item_flag: --work-item
  runtime_flag: --runtime
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-HONO-NON-ERROR-THROW
    title: non-Error throw handling
    summary: Ensure thrown non-Error values from middleware still flow through onError
      instead of causing an unhandled rejection.
    intent: Preserve Hono middleware error handling semantics when application code
      throws strings, plain objects, or other non-Error values.
    target_change: Normalize non-Error thrown values at the error boundary and add
      regression coverage for the middleware/onError path without widening the
      public error handler or context error type contracts.
    expected_scope: Localized runtime behavior plus tests in the Hono middleware or
      request dispatch path.
    acceptance_criteria:
    - Non-Error thrown values are delivered to configured onError handling instead of
      surfacing as unhandled promise rejections.
    - Existing Error object handling remains unchanged.
    - Public error handler and context error types remain source-compatible for
      existing Hono users; the fix must not require release-note-documented type
      narrowing by consumers.
    - Regression tests cover at least one primitive thrown value and one object thrown value.
    verification:
    - ./node_modules/.bin/vitest --run src/hono.test.ts src/compose.test.ts
    - ./node_modules/.bin/tsc --noEmit
    quality_bar: The patch is localized, typed, regression-covered, preserves the
      existing public error type contracts, and does not weaken existing Error
      handling behavior.
    size_rationale: Medium because the behavioral fix touches runtime error handling and
      type-checked tests, but should remain within one subsystem.
verify:
  commands:
  - ./node_modules/.bin/vitest --run src/hono.test.ts src/compose.test.ts
  - ./node_modules/.bin/tsc --noEmit
  - test -f .aidd/workitems/WI-LIVE-HONO-SMOKE/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-HONO-SMOKE/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification commands exit with status 0.
  - Focused Hono runtime and compose regression tests report no failing tests.
  - TypeScript compile check reports no type errors.
  - QA stage output artifacts exist for the selected work item.
quality:
  commands:
  - ./node_modules/.bin/vitest --run src/hono.test.ts src/compose.test.ts
  - ./node_modules/.bin/tsc --noEmit
  rubric_profile: live-full
  require_review_status: approved
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
limits:
  patch_budget_files: 8
  timeout_minutes: 20
interview:
  required: false
runtime_targets:
- codex
- claude-code
- qwen
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: agent-decides
  frontend_checkpoints: true
