id: AIDD-LIVE-009
scenario_class: live-full-flow
feature_size: small
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/simonw/sqlite-utils
  default_branch: main
  revision: 8d74ffc93292c604d5827e2b44fffedca0c28c19
objective: Exercise a less scripted live audit where the runtime must choose the
  narrow implementation path from a CSV import resilience boundary rather than a
  fully specified bugfix recipe.
task: Run the installed AIDD full-flow live audit against the selected sqlite-utils
  resilience task and preserve reviewable execution evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync
  rationale:
  - Install sqlite-utils development dependencies before the live audit.
  - Keep the target repository pinned while leaving implementation choices to the runtime.
aidd_invocation:
  work_item: WI-LIVE-SQLITE-CSV-BOUNDARY
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-SQLITE-CSV-RESILIENCE-BOUNDARY
    title: CSV import resilience boundary
    summary: Improve CSV import behavior for a small malformed or low-data edge case
      selected from the existing import path while keeping the patch tightly scoped.
    intent: Make CSV import behavior more robust for users without requiring a broad
      import rewrite or unrelated CLI changes.
    target_change: Identify a narrow CSV import edge case, implement the smallest
      compatible behavior improvement, and add focused regression coverage.
    expected_scope: Localized CSV import code, tests for the chosen edge case, and
      no broad schema/import architecture rewrite.
    acceptance_criteria:
    - The chosen CSV edge case is stated explicitly in implementation, review, or QA evidence.
    - Regression coverage exercises the public CLI or nearest stable import API for that edge case.
    - Existing normal CSV import behavior remains covered by the focused verification command.
    - The tracked diff stays within the allowed CSV import/test scope and patch budget.
    verification:
    - uv run pytest -q
    - test -f .aidd/workitems/WI-LIVE-SQLITE-CSV-BOUNDARY/stages/qa/output/stage-result.md
    - test -f .aidd/workitems/WI-LIVE-SQLITE-CSV-BOUNDARY/stages/qa/output/validator-report.md
    quality_bar: The runtime should make and justify a narrow implementation choice,
      prove it with tests, and avoid following a pre-authored solution recipe.
    size_rationale: Small because the acceptance boundary is narrow even though the
      exact edge case and implementation path are left to the runtime.
operator_execution:
  install_channel: uv-tool
  artifact_source: local-wheel
  execution_cwd: repository-root
  workspace_root: .aidd
  resource_source: packaged-assets
verify:
  commands:
  - uv run pytest -q
  - test -f .aidd/workitems/WI-LIVE-SQLITE-CSV-BOUNDARY/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-SQLITE-CSV-BOUNDARY/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification command exits with status 0.
  - Pytest output reports all tests as passed.
  - QA stage output artifacts exist for the selected work item.
limits:
  patch_budget_files: 5
  timeout_minutes: 240
interview:
  required: false
runtime_targets:
- codex
- opencode
- claude-code
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: agent-decides
  frontend_checkpoints: true
