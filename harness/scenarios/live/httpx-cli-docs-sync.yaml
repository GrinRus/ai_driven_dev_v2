id: AIDD-LIVE-004
repo:
  url: https://github.com/encode/httpx
  default_branch: master
issue:
  id: null
  title: CLI docs sync
task: Update docs and examples after a small CLI behavior change and prove docs, examples,
  and verification still align.
stage_scope:
  start: plan
  end: qa
setup:
  commands:
  - uv sync || pip install -e .[dev]
verify:
  commands:
  - uv run pytest -q || pytest -q
limits:
  patch_budget_files: 6
  timeout_minutes: 15
interview:
  required: false
runtime_targets:
- claude-code
- generic-cli
