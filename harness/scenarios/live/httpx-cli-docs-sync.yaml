id: AIDD-LIVE-004
scenario_class: live-full-flow
feature_size: tiny
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/encode/httpx
  default_branch: master
objective: Keep HTTPX documentation-focused live coverage deterministic with an
  authored docs-sync task instead of dynamic external task discovery.
task: Run the installed AIDD full-flow live audit against the selected HTTPX documentation
  task and preserve reviewable execution evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync
aidd_invocation:
  work_item: WI-LIVE-HTTPX-DOCS-SYNC
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-HTTPX-CLI-DOCS-SYNC
    title: CLI docs sync
    summary: Update docs and examples after a small CLI behavior change and prove
      docs, examples, and verification still align.
    intent: Improve the HTTPX CLI documentation with the exact concrete command
      `httpx https://httpbin.org/json` so the authored task and verification checks stay
      aligned with current command behavior.
    target_change: Update the CLI-facing documentation surfaces only; the expected
      docs example is exactly `httpx https://httpbin.org/json`, and no runtime HTTPX
      behavior change is expected.
    expected_scope: Documentation-only change in one or two Markdown files.
    acceptance_criteria:
    - CLI documentation includes the exact concrete command `httpx https://httpbin.org/json`
      using a real inspectable endpoint, without calling that endpoint during verification.
    - README and docs index content stay consistent if both mention CLI behavior.
    - The change does not introduce placeholder URLs as if they were runnable examples.
    - Verification checks documentation text and diff scope only; it must not call
      the public endpoint.
    verification:
    - |
      .venv/bin/python - <<'PY'
      import subprocess
      allowed = {"README.md", "docs/index.md"}
      changed = set(subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines())
      unexpected = sorted(changed - allowed)
      if unexpected:
          raise SystemExit(f"unexpected tracked docs-sync changes: {unexpected}")
      if not changed:
          raise SystemExit("expected docs-sync tracked changes")
      PY
    - |
      .venv/bin/python - <<'PY'
      import subprocess
      from pathlib import Path

      needle = "httpx " + "https:" + "//httpbin.org/json"
      docs = ("README.md", "docs/index.md")
      missing = [path for path in docs if needle not in Path(path).read_text(encoding="utf-8")]
      if missing:
          raise SystemExit(f"missing concrete CLI example in: {missing}")

      diff = subprocess.check_output(["git", "diff", "--", *docs], text=True)
      added = "\n".join(
          line[1:] for line in diff.splitlines()
          if line.startswith("+") and not line.startswith("+++")
      ).lower()
      placeholders = ("example.com", "example.org", "example.net", "placeholder")
      offenders = [item for item in placeholders if item in added]
      if offenders:
          raise SystemExit(f"placeholder runnable example introduced: {offenders}")
      PY
    - test -f .aidd/workitems/WI-LIVE-HTTPX-DOCS-SYNC/stages/qa/output/stage-result.md
    - test -f .aidd/workitems/WI-LIVE-HTTPX-DOCS-SYNC/stages/qa/output/validator-report.md
    quality_bar: The documentation should be minimal, truthful, runnable or clearly
      labeled, should not require source changes, and should pass docs-only
      acceptance checks. Full upstream pytest remains useful exploratory evidence
      for operators but is not required execution evidence for this tiny docs-only lane.
    size_rationale: Tiny because this is docs-only, expected to touch one or two files
      without runtime behavior changes.
verify:
  commands:
  - |
    .venv/bin/python - <<'PY'
    import subprocess
    allowed = {"README.md", "docs/index.md"}
    changed = set(subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines())
    unexpected = sorted(changed - allowed)
    if unexpected:
        raise SystemExit(f"unexpected tracked docs-sync changes: {unexpected}")
    if not changed:
        raise SystemExit("expected docs-sync tracked changes")
    PY
  - |
    .venv/bin/python - <<'PY'
    import subprocess
    from pathlib import Path

    needle = "httpx " + "https:" + "//httpbin.org/json"
    docs = ("README.md", "docs/index.md")
    missing = [path for path in docs if needle not in Path(path).read_text(encoding="utf-8")]
    if missing:
        raise SystemExit(f"missing concrete CLI example in: {missing}")

    diff = subprocess.check_output(["git", "diff", "--", *docs], text=True)
    added = "\n".join(
        line[1:] for line in diff.splitlines()
        if line.startswith("+") and not line.startswith("+++")
    ).lower()
    placeholders = ("example.com", "example.org", "example.net", "placeholder")
    offenders = [item for item in placeholders if item in added]
    if offenders:
        raise SystemExit(f"placeholder runnable example introduced: {offenders}")
    PY
  - test -f .aidd/workitems/WI-LIVE-HTTPX-DOCS-SYNC/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-HTTPX-DOCS-SYNC/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification commands exit with status 0.
  - Tracked product diff is limited to README.md and docs/index.md.
  - README.md and docs/index.md contain the same concrete https://httpbin.org/json CLI example.
  - Added documentation lines do not introduce placeholder URLs as runnable examples.
  - Verification does not call the public endpoint.
  - QA stage output artifacts exist for the selected work item.
limits:
  patch_budget_files: 3
  timeout_minutes: 240
interview:
  required: false
runtime_targets:
- codex
- qwen
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: agent-decides
  frontend_checkpoints: true
