id: AIDD-LIVE-004
scenario_class: live-full-flow
feature_size: tiny
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/encode/httpx
  default_branch: master
objective: Keep HTTPX documentation-focused live coverage deterministic with an
  authored docs-sync task instead of dynamic external task discovery.
task: Run the installed AIDD full-flow live audit against the selected HTTPX documentation
  task and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync
aidd_invocation:
  work_item: WI-LIVE-HTTPX-DOCS-SYNC
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-HTTPX-CLI-DOCS-SYNC
    title: CLI docs sync
    summary: Update docs and examples after a small CLI behavior change and prove
      docs, examples, and verification still align.
    intent: Improve the HTTPX CLI documentation with a concrete, runnable example
      that remains consistent with current command behavior.
    target_change: Update the CLI-facing documentation surfaces only; no runtime HTTPX
      behavior change is expected.
    expected_scope: Documentation-only change in one or two Markdown files.
    acceptance_criteria:
    - CLI documentation includes a concrete example that uses a real inspectable endpoint
      or explains any local test server requirement.
    - README and docs index content stay consistent if both mention CLI behavior.
    - The change does not introduce placeholder URLs as if they were runnable examples.
    verification:
    - UV_CACHE_DIR=.aidd/uv-cache uv run --with-requirements requirements.txt pytest -q
    - test -f .aidd/workitems/WI-LIVE-HTTPX-DOCS-SYNC/stages/qa/output/stage-result.md
    - test -f .aidd/workitems/WI-LIVE-HTTPX-DOCS-SYNC/stages/qa/output/validator-report.md
    quality_bar: The documentation should be minimal, truthful, runnable or clearly
      labeled, and should not require source changes.
    size_rationale: Tiny because this is docs-only, expected to touch one or two files
      without runtime behavior changes.
verify:
  commands:
  - "UV_CACHE_DIR=.aidd/uv-cache uv run --with-requirements requirements.txt pytest -q"
  - test -f .aidd/workitems/WI-LIVE-HTTPX-DOCS-SYNC/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-HTTPX-DOCS-SYNC/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification commands exit with status 0.
  - QA stage output artifacts exist for the selected work item.
quality:
  commands:
  - "UV_CACHE_DIR=.aidd/uv-cache uv run --with-requirements requirements.txt pytest -q"
  rubric_profile: live-full
  require_review_status: approved
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
limits:
  patch_budget_files: 3
  timeout_minutes: 240
interview:
  required: false
runtime_targets:
- codex
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: none
  frontend_checkpoints: true
