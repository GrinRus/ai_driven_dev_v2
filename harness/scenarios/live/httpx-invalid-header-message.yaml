id: AIDD-LIVE-003
scenario_class: live-full-flow
feature_size: small
automation_lane: manual
canonical_runtime: codex
repo:
  url: https://github.com/encode/httpx
  default_branch: master
  revision: b5addb64f0161ff6bfe94c124ef76f6a1fba5254
objective: Keep HTTPX smoke lane deterministic by targeting the invalid-header
  diagnostics defect with bounded patch scope.
task: Run the installed AIDD full-flow live audit against the selected HTTPX authored task
  and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync
  rationale:
  - Install HTTPX development dependencies before the live audit.
  - Confirm the repository environment is ready for targeted regression verification.
aidd_invocation:
  command:
  - uv
  - run
  - aidd
  - run
  work_item: WI-LIVE-HTTPX-SMOKE
  work_item_flag: --work-item
  runtime_flag: --runtime
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-HTTPX-INVALID-HEADER-MESSAGE
    title: invalid header error message
    summary: Improve the invalid-header encoding error so the failing header name
      is visible in the resulting exception or wrapper message.
    intent: Make HTTPX invalid-header diagnostics actionable when a header value cannot
      be encoded.
    target_change: Include the failing header name in the relevant invalid-header exception
      path and add focused regression coverage.
    expected_scope: Localized diagnostics behavior plus tests around header validation.
    acceptance_criteria:
    - The raised error identifies the header name that failed validation or encoding.
    - Existing invalid-header validation semantics remain unchanged.
    - Regression tests cover the failing diagnostic path.
    verification:
    - uv run pytest -q
    - test -f .aidd/workitems/WI-LIVE-HTTPX-SMOKE/stages/qa/output/stage-result.md
    - test -f .aidd/workitems/WI-LIVE-HTTPX-SMOKE/stages/qa/output/validator-report.md
    quality_bar: The patch should be small, behavior-preserving except for diagnostics,
      and backed by a precise test.
    size_rationale: Small because the expected change is localized to one diagnostics
      path plus regression coverage.
verify:
  commands:
  - uv run pytest -q
  - test -f .aidd/workitems/WI-LIVE-HTTPX-SMOKE/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-HTTPX-SMOKE/stages/qa/output/validator-report.md
  pass_conditions:
  - Verification command exits with status 0.
  - Pytest output reports all tests as passed.
  - No new failing tests are introduced relative to baseline.
  - QA stage output artifacts exist for the selected work item.
quality:
  commands:
  - uv run pytest -q
  rubric_profile: live-full
  require_review_status: approved
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
limits:
  patch_budget_files: 4
  timeout_minutes: 20
interview:
  required: false
runtime_targets:
- codex
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: none
  frontend_checkpoints: true
