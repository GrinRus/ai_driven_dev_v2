id: AIDD-LIVE-006
scenario_class: live-full-flow-interview
feature_size: xlarge
live_matrix_role: product-evaluation
automation_lane: manual
canonical_runtime: opencode
repo:
  url: https://github.com/simonw/sqlite-utils
  default_branch: main
  revision: 8d74ffc93292c604d5827e2b44fffedca0c28c19
objective: Keep sqlite-utils interview live coverage deterministic with an authored
  yielded-rows task that requires explicit requirement clarification.
task: Run the installed AIDD full-flow live audit against the selected sqlite-utils
  interview task and preserve reviewable execution evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync
aidd_invocation:
  work_item: WI-LIVE-SQLITE-INTERVIEW
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: authored-task-pool
  selection_policy: first-listed
  tasks:
  - id: TASK-LIVE-SQLITE-YIELDED-ROWS
    title: yielded rows feature
    summary: Add a CLI path for passing Python code or a Python file that yields
      rows to insert, and require an interview about trust boundaries, accepted input
      form, and documentation expectations.
    intent: Explore a governed implementation path for inserting rows yielded by
      user-provided Python while making execution boundaries explicit.
    target_change: Implement the answered input form and trust-boundary policy, plus
      tests and documentation for the selected behavior.
    expected_scope: CLI option design, execution safety checks, insertion behavior,
      tests, and documentation.
    acceptance_criteria:
    - Blocking answers define the accepted input form and execution trust boundary.
    - The implemented behavior matches those answers without silently broadening scope.
    - Tests cover successful yielded-row insertion and at least one invalid or unsafe input.
    - Documentation explains the selected form and trust caveats.
    verification:
    - aidd stage questions idea --work-item WI-LIVE-SQLITE-INTERVIEW
    - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/idea/answers.md
    - uv run pytest -q
    - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/qa/output/stage-result.md
    - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/qa/output/validator-report.md
    quality_bar: The result must be explicit about code execution risk, covered by tests,
      and documented without implying a broader security guarantee. When resolved
      interview answers intentionally select trusted local Python execution and the
      implementation stays inside that boundary with confirmation, tests, and documentation,
      the inherent trust requirement is satisfied acceptance context rather than a residual
      release risk by itself.
    size_rationale: Xlarge product-evaluation lane because it is a new CLI feature
      gated by interview decisions and spans user-provided code execution policy,
      insertion behavior, tests, and documentation.
    visible_request: |
      Add a sqlite-utils CLI workflow for inserting rows yielded by user-provided
      Python. The product behavior must not be guessed: first clarify the accepted
      input form and execution trust boundary, then implement only the answered
      policy. The result should insert yielded rows successfully for the chosen
      form, reject at least one invalid or unsafe input, and document the trust
      caveats without implying a broader security guarantee.
    audit_rubric: |
      Evaluate whether AIDD stops for the security/trust interview before planning,
      keeps implementation inside the answered policy, and treats documentation as
      part of the product deliverable. Count defects when AIDD silently invents a
      code-execution policy, supports extra input forms, lacks negative tests, or
      overstates security guarantees.
    complexity_axes:
    - interview
    - security
    - cli
    - docs
    - cross-module
    interview:
    - Execution trust boundary for user-provided Python code.
    - Accepted input form (inline expression, file, or both).
    - Required documentation updates and examples for the selected form.
verify:
  commands:
  - aidd stage questions idea --work-item WI-LIVE-SQLITE-INTERVIEW
  - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/idea/answers.md
  - uv run pytest -q
  - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/qa/output/validator-report.md
  pass_conditions:
  - The first stage-questions check reports at least one pending blocking question.
  - Answers file resolves each blocking question before stage rerun.
  - Final verification command exits with status 0 after resume.
  - QA stage output artifacts exist after the resumed execution path.
  flow_steps:
  - step: blocked
    evidence: questions.md exists with at least one blocking question id.
  - step: resumed
    evidence: answers.md exists and marks each blocking question as resolved.
  - step: completed
    evidence: verification command and QA output artifact checks succeed after rerun.
limits:
  patch_budget_files: 60
  timeout_minutes: 240
interview:
  required: true
  must_ask_at_least_one: true
  blocking_question_topics:
  - Execution trust boundary for user-provided Python code.
  - Accepted input form (inline expression, file, or both).
  - Required documentation updates and examples for the selected form.
  trigger_conditions:
  - If code execution policy is not explicitly stated, ask a blocking question before planning.
  - If accepted input forms are ambiguous, ask a blocking question before task decomposition.
  - If documentation obligations are unclear, ask a blocking question before implementation.
  answer_flow:
    mode: answers_markdown_and_stage_rerun
    answers_file: .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/idea/answers.md
    question_check_command:
    - aidd
    - stage
    - questions
    - idea
    - --work-item
    - WI-LIVE-SQLITE-INTERVIEW
    resume_command:
    - aidd
    - stage
    - run
    - idea
    - --work-item
    - WI-LIVE-SQLITE-INTERVIEW
    - --runtime
    - opencode
    answer_requirements:
    - Resolve every blocking question with explicit policy choices.
    - Keep accepted input-form decisions and documentation obligations in the same answers file.
runtime_targets:
- codex
- opencode
live_flow:
  driver: stepwise-black-box
  checkpoint_policy: after-each-step
  answer_policy: agent-decides
  frontend_checkpoints: true
