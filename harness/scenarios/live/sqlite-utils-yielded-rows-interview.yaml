id: AIDD-LIVE-006
repo:
  url: https://github.com/simonw/sqlite-utils
  default_branch: main
objective: Keep sqlite-utils interview live coverage deterministic by using a curated
  issue that still requires explicit requirement clarification.
task: Run the installed AIDD full-flow live audit against the selected sqlite-utils
  interview issue and preserve reviewable quality evidence.
stage_scope:
  start: idea
  end: qa
setup:
  commands:
  - uv sync || pip install -e .[dev]
aidd_invocation:
  work_item: WI-LIVE-SQLITE-INTERVIEW
  expected_stage_scope:
    start: idea
    end: qa
feature_source:
  mode: curated-issue-pool
  selection_policy: first-listed
  issues:
  - id: '694'
    title: yielded rows feature
    url: https://github.com/simonw/sqlite-utils/issues/694
    summary: Add a CLI path for passing Python code or a Python file that yields
      rows to insert, and require an interview about trust boundaries, accepted input
      form, and documentation expectations.
    labels:
    - feature
    - interview
verify:
  commands:
  - uv run aidd stage questions idea --work-item WI-LIVE-SQLITE-INTERVIEW
  - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/idea/answers.md
  - uv run pytest -q || pytest -q
  - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/qa/output/stage-result.md
  - test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/qa/output/validator-report.md
  pass_conditions:
  - The first stage-questions check reports at least one pending blocking question.
  - Answers file resolves each blocking question before stage rerun.
  - Final verification command exits with status 0 after resume.
  - QA stage output artifacts exist after the resumed execution path.
  flow_steps:
  - step: blocked
    evidence: questions.md exists with at least one blocking question id.
  - step: resumed
    evidence: answers.md exists and marks each blocking question as resolved.
  - step: completed
    evidence: verification command and QA output artifact checks succeed after rerun.
quality:
  commands:
  - uv run pytest -q || pytest -q
  rubric_profile: live-full
  require_review_status: approved-with-conditions
  allowed_qa_verdicts:
  - ready
  - ready-with-risks
  code_review_required: true
reference_run:
  run_id: eval-live-006-codex-reference-20260422T123937Z
  recorded_at_utc: '2026-04-22T12:39:38Z'
  runtime: codex
  status: harness_fail
  resolved_revision: 8d74ffc93292c604d5827e2b44fffedca0c28c19
  bundle_root: .aidd/reports/evals/eval-live-006-codex-reference-20260422T123937Z
  first_failure_signal: Verification command `test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/idea/answers.md`
    exited with status 1.
opencode_reference_run:
  run_id: eval-live-006-opencode-20260422T142812Z
  recorded_at_utc: '2026-04-22T14:28:19Z'
  runtime: opencode
  status: harness_blocked
  resolved_revision: 8d74ffc93292c604d5827e2b44fffedca0c28c19
  bundle_root: .aidd/reports/evals/eval-live-006-opencode-20260422T142812Z
  first_failure_signal: Verification command `test -f .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/idea/answers.md`
    exited with status 1.
limits:
  patch_budget_files: 10
  timeout_minutes: 25
interview:
  required: true
  must_ask_at_least_one: true
  blocking_question_topics:
  - Execution trust boundary for user-provided Python code.
  - Accepted input form (inline expression, file, or both).
  - Required documentation updates and examples for the selected form.
  trigger_conditions:
  - If code execution policy is not explicitly stated, ask a blocking question before planning.
  - If accepted input forms are ambiguous, ask a blocking question before task decomposition.
  - If documentation obligations are unclear, ask a blocking question before implementation.
  answer_flow:
    mode: answers_markdown_and_stage_rerun
    answers_file: .aidd/workitems/WI-LIVE-SQLITE-INTERVIEW/stages/idea/answers.md
    question_check_command:
    - uv
    - run
    - aidd
    - stage
    - questions
    - idea
    - --work-item
    - WI-LIVE-SQLITE-INTERVIEW
    resume_command:
    - uv
    - run
    - aidd
    - stage
    - run
    - idea
    - --work-item
    - WI-LIVE-SQLITE-INTERVIEW
    - --runtime
    - generic-cli
    answer_requirements:
    - Resolve every blocking question with explicit policy choices.
    - Keep accepted input-form decisions and documentation obligations in the same answers file.
runtime_targets:
- claude-code
- generic-cli
- codex
- opencode
